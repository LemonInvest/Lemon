<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB - ADMIN MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #070b14; color: white; font-family: sans-serif; }
        .card-adm { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; }
        .input-adm { background: #1e293b; border: 1px solid #334155; color: white; border-radius: 0.5rem; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 pb-20">
    <div id="login-screen" class="fixed inset-0 bg-[#070b14] flex flex-col items-center justify-center z-[100] p-6">
        <i class="fab fa-github text-6xl text-blue-500 mb-4"></i>
        <h2 class="text-xl font-black mb-6 italic">ACESSO MASTER</h2>
        <input type="password" id="admin-key" placeholder="Chave ABS..." class="w-full max-w-xs p-4 input-adm text-center mb-4">
        <button onclick="checkAccess()" class="w-full max-w-xs bg-blue-600 py-4 rounded-xl font-black">ENTRAR</button>
    </div>

    <div id="admin-content" class="hidden">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-2xl font-black text-blue-500 italic">GITHUB CONTROL</h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase">Inscritos Total: <span id="total-users" class="text-white">0</span></p>
            </div>
            <button onclick="location.reload()" class="bg-red-500/20 text-red-500 text-[10px] px-3 py-2 rounded-lg font-black border border-red-500/30">LIMPAR CACHE</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="tab('pedidos')" id="btn-pedidos" class="flex-1 bg-blue-600 py-3 rounded-lg font-black text-[11px] uppercase">Pedidos</button>
            <button onclick="tab('usuarios')" id="btn-usuarios" class="flex-1 bg-slate-800 py-3 rounded-lg font-black text-[11px] uppercase">Usuários</button>
        </div>

        <div id="sec-pedidos" class="space-y-4">
            <h2 class="text-xs font-black text-slate-500 uppercase italic">Solicitações Financeiras</h2>
            <div id="lista-pedidos" class="space-y-4"></div>
        </div>

        <div id="sec-usuarios" class="hidden space-y-4">
            <div class="card-adm p-4">
                <p class="text-[10px] font-black mb-2 opacity-50">PESQUISA RÁPIDA (CONTACTO)</p>
                <div class="flex gap-2">
                    <input type="number" id="search-input" placeholder="9xxxxxxxx" class="flex-1 p-3 input-adm text-sm">
                    <button onclick="searchUser()" class="bg-blue-600 px-5 rounded-lg"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div id="lista-usuarios" class="space-y-4"></div>
        </div>
    </div>

    <div id="modal-img" class="fixed inset-0 bg-black/95 hidden flex flex-col items-center justify-center z-[110] p-4" onclick="this.classList.add('hidden')">
        <img id="full-img" src="" class="max-w-full max-h-[80vh] border-2 border-blue-500 rounded-xl">
        <p class="mt-4 font-black text-xs uppercase italic">Clique para fechar</p>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA03WW6zrf79PsZY6KvaxGRsGFY1AEFCYs", 
            authDomain: "fir-b8708.firebaseapp.com", 
            projectId: "fir-b8708", 
            storageBucket: "fir-b8708.firebasestorage.app", 
            messagingSenderId: "174524990208", 
            appId: "1:174524990208:web:eb08738fdd7cd1cd98a9e5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkAccess = () => {
            if(document.getElementById('admin-key').value === 'ABS..943') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
            } else { alert("Chave Inválida"); }
        };

        window.tab = (tipo) => {
            document.getElementById('sec-pedidos').classList.toggle('hidden', tipo !== 'pedidos');
            document.getElementById('sec-usuarios').classList.toggle('hidden', tipo !== 'usuarios');
            document.getElementById('btn-pedidos').className = tipo === 'pedidos' ? 'flex-1 bg-blue-600 py-3 rounded-lg font-black text-[11px] uppercase' : 'flex-1 bg-slate-800 py-3 rounded-lg font-black text-[11px] uppercase';
            document.getElementById('btn-usuarios').className = tipo === 'usuarios' ? 'flex-1 bg-blue-600 py-3 rounded-lg font-black text-[11px] uppercase' : 'flex-1 bg-slate-800 py-3 rounded-lg font-black text-[11px] uppercase';
        };

        onSnapshot(collection(db, "usuarios"), (snap) => {
            const listP = document.getElementById('lista-pedidos');
            const listU = document.getElementById('lista-usuarios');
            listP.innerHTML = ""; listU.innerHTML = "";
            document.getElementById('total-users').innerText = snap.size;

            snap.forEach(userDoc => {
                const u = userDoc.data();
                const uid = userDoc.id;

                // Renderizar Pedidos Pendentes
                u.extrato?.forEach((ex, idx) => {
                    if(ex.status === "Em análise" || ex.status === "Pendente") {
                        const pCard = document.createElement('div');
                        pCard.className = "card-adm p-4 border-l-4 " + (ex.desc.includes('Saque') ? 'border-red-500' : 'border-green-500');
                        pCard.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-black uppercase text-blue-400">${ex.desc}</span>
                                <b class="text-lg">${ex.valor} KZ</b>
                            </div>
                            <p class="text-[9px] font-bold mb-3 opacity-50">USUÁRIO: ${uid}</p>
                            ${ex.foto ? `<button onclick="window.ver('${ex.foto}')" class="w-full bg-slate-800 py-2 rounded mb-3 text-[10px] font-bold">VER COMPROVANTE</button>` : ''}
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="window.decidir('${uid}', ${idx}, 'Aprovado', ${ex.valor}, '${ex.desc}')" class="bg-green-600 py-2 rounded font-bold text-[10px]">APROVAR</button>
                                <button onclick="window.decidir('${uid}', ${idx}, 'Rejeitado', ${ex.valor}, '${ex.desc}')" class="bg-red-600 py-2 rounded font-bold text-[10px]">REJEITAR</button>
                            </div>
                        `;
                        listP.appendChild(pCard);
                    }
                });

                // Renderizar Cartão de Gestão de Usuário
                const uCard = document.createElement('div');
                uCard.id = "user-card-" + uid;
                uCard.className = "card-adm p-4";
                uCard.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3 mb-3">
                        <b class="text-blue-400 italic">${uid}</b>
                        <div class="flex gap-2">
                            <button onclick="window.toggleBan('${uid}', ${u.banido})" class="${u.banido?'bg-red-500':'bg-slate-700'} text-[9px] px-3 py-1 rounded font-black">${u.banido?'DESBLOQUEAR':'BLOQUEAR'}</button>
                            <button onclick="window.eliminar('${uid}')" class="bg-red-900 text-[9px] px-3 py-1 rounded font-black">APAGAR</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-y-2 text-[10px] font-bold mb-4">
                        <p>SALDO: <span class="text-green-500">${u.saldo} KZ</span></p>
                        <p>SENHA: <span class="text-orange-400">${u.pw}</span></p>
                        <p class="col-span-2">IBAN: ${u.banco?.i || 'NÃO CONFIGURADO'}</p>
                        <p class="col-span-2">CONVIDADOS: ${u.convidados || 0}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="window.ajustarSaldo('${uid}', 'add')" class="bg-blue-600/20 text-blue-400 py-2 rounded text-[9px] font-black">ADD SALDO</button>
                        <button onclick="window.ajustarSaldo('${uid}', 'sub')" class="bg-red-600/20 text-red-400 py-2 rounded text-[9px] font-black">RETIRAR SALDO</button>
                        <button onclick="window.darBonus('${uid}')" class="bg-yellow-600/20 text-yellow-500 py-2 rounded text-[9px] font-black">DAR BÓNUS</button>
                        <button onclick="window.novaSenha('${uid}')" class="bg-slate-700 py-2 rounded text-[9px] font-black">MUDAR SENHA</button>
                    </div>
                    <details class="mt-4"><summary class="text-[9px] font-black opacity-50 uppercase">Ver Extrato Completo</summary>
                        <div class="mt-2 space-y-1 text-[8px] max-h-32 overflow-y-auto">
                            ${u.extrato?.map(e => `<div class="flex justify-between border-b border-slate-800 py-1"><span>${e.desc}</span><b class="${e.status==='Aprovado'?'text-green-500':'text-red-400'}">${e.status}</b></div>`).join('')}
                        </div>
                    </details>
                `;
                listU.appendChild(uCard);
            });
        });

        window.searchUser = () => {
            const val = document.getElementById('search-input').value;
            const el = document.getElementById('user-card-' + val);
            if(el) { el.scrollIntoView(); el.classList.add('border-blue-500', 'border-2'); setTimeout(() => el.classList.remove('border-blue-500', 'border-2'), 3000); }
            else { alert("Usuário não encontrado"); }
        };

        window.ver = (src) => { document.getElementById('full-img').src = src; document.getElementById('modal-img').classList.remove('hidden'); };
        window.toggleBan = async (uid, status) => { await updateDoc(doc(db, "usuarios", uid), { banido: !status }); alert("Status alterado!"); };
        window.eliminar = async (uid) => { if(confirm("Apagar conta "+uid+" permanentemente?")) await deleteDoc(doc(db, "usuarios", uid)); };
        
        window.ajustarSaldo = async (uid, tipo) => {
            const val = parseFloat(prompt("Valor a " + (tipo==='add'?'adicionar':'retirar') + ":"));
            if(val > 0) {
                await updateDoc(doc(db, "usuarios", uid), { 
                    saldo: increment(tipo==='add' ? val : -val),
                    extrato: arrayUnion({ data: new Date().toLocaleString(), valor: val, desc: "Ajuste Administrativo", status: "Aprovado" })
                });
                alert("Saldo atualizado!");
            }
        };

        window.darBonus = async (uid) => {
            const val = parseFloat(prompt("Valor do bónus:"));
            if(val > 0) {
                await updateDoc(doc(db, "usuarios", uid), { 
                    saldo: increment(val),
                    extrato: arrayUnion({ data: new Date().toLocaleString(), valor: val, desc: "Bónus de Sistema", status: "Aprovado" })
                });
                alert("Bónus atribuído!");
            }
        };

        window.novaSenha = async (uid) => {
            const s = prompt("Digite a nova senha de 6 dígitos:");
            if(s && s.length === 6) { await updateDoc(doc(db, "usuarios", uid), { pw: s }); alert("Senha alterada!"); }
        };

        window.decidir = async (uid, idx, status, valor, desc) => {
            const ref = doc(db, "usuarios", uid);
            const uSnap = await getDoc(ref);
            let ext = [...uSnap.data().extrato];
            ext[idx].status = status;
            let up = { extrato: ext };
            if(status === 'Aprovado' && desc.includes('Depósito')) { up.saldo = increment(valor); up.r_total = increment(valor); }
            if(status === 'Rejeitado' && desc.includes('Saque')) { up.saldo = increment(valor); }
            await updateDoc(ref, up);
            alert("Pedido " + status);
        };
    </script>
</body>
</html>
