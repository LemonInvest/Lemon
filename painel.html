<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB - ADMIN MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; }
        .card-adm { background: #1e293b; border-radius: 1.2rem; border: 1px solid #334155; }
        .input-adm { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 0.8rem; outline: none; width: 100%; font-weight: bold; }
        .btn-acao { transition: all 0.2s; font-weight: 900; text-transform: uppercase; border-radius: 0.8rem; }
        .btn-acao:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body>
<div id="login-master" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <i class="fab fa-github text-7xl text-blue-500 mb-4"></i>
    <h1 class="text-3xl font-black italic mb-8 uppercase tracking-tighter text-blue-500">Master Admin</h1>
    <input type="password" id="key-adm" placeholder="CHAVE DE ACESSO" class="input-adm text-center mb-4 max-w-xs text-xl border-blue-500/30">
    <button onclick="entrarPainel()" class="w-full max-w-xs bg-blue-600 py-5 btn-acao shadow-lg shadow-blue-600/20">Aceder ao Controlo</button>
</div>

<div id="painel-master" class="hidden min-h-screen">
    <header class="p-6 border-b border-slate-700 flex justify-between items-center sticky top-0 bg-slate-900 z-50">
        <div><h2 class="font-black italic text-blue-500 text-xl">GITHUB MASTER</h2><p class="text-[9px] opacity-50 font-bold uppercase">Painel de Operações</p></div>
        <button onclick="limparCache()" class="bg-red-500/10 text-red-500 text-[10px] px-4 py-2 rounded-lg font-black border border-red-500/20"><i class="fas fa-broom mr-1"></i> LIMPAR CACHE</button>
    </header>

    <div class="p-4 space-y-6">
        <div class="card-adm p-5">
            <p class="text-[10px] font-black mb-3 opacity-50 uppercase italic">Pesquisar ou Listar Usuários</p>
            <div class="flex gap-2">
                <input type="number" id="busca-id" placeholder="Nº Telefone" class="input-adm">
                <button onclick="buscarUser()" class="bg-blue-600 px-6 btn-acao"><i class="fas fa-search"></i></button>
            </div>
            <div id="lista-atividades" class="mt-6 space-y-4"></div>
        </div>
    </div>
</div>

<div id="modal-img" class="fixed inset-0 bg-black/95 hidden z-[100] flex flex-col items-center justify-center p-4">
    <img id="full-img" src="" class="max-w-full max-h-[75vh] border-4 border-white rounded-2xl shadow-2xl">
    <div class="grid grid-cols-2 gap-4 w-full max-w-xs mt-6">
        <button onclick="fecharImg()" class="bg-slate-700 py-4 btn-acao text-xs">Voltar</button>
        <button id="btn-aprovar-modal" class="bg-green-600 py-4 btn-acao text-xs">Aprovar Agora</button>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA03WW6zrf79PsZY6KvaxGRsGFY1AEFCYs", authDomain: "fir-b8708.firebaseapp.com", 
        projectId: "fir-b8708", storageBucket: "fir-b8708.firebasestorage.app", 
        messagingSenderId: "174524990208", appId: "1:174524990208:web:eb08738fdd7cd1cd98a9e5" 
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.entrarPainel = () => {
        if(document.getElementById('key-adm').value === 'ABS..943') {
            document.getElementById('login-master').classList.add('hidden');
            document.getElementById('painel-master').classList.remove('hidden');
            iniciarMonitoramento();
        } else alert("CHAVE INVÁLIDA");
    };

    window.limparCache = () => { if(confirm("Limpar cache e atualizar?")) location.reload(); };

    function iniciarMonitoramento() {
        onSnapshot(collection(db, "usuarios"), (snap) => {
            const list = document.getElementById('lista-atividades'); list.innerHTML = "";
            snap.forEach(userDoc => {
                const u = userDoc.data(), uid = userDoc.id;
                const card = document.createElement('div');
                card.className = "bg-slate-800 p-5 rounded-2xl border border-slate-700 mb-4";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div><b class="text-blue-400 text-lg italic">ID: ${uid}</b><br><small class="font-black text-orange-400">SENHA: ${u.pw}</small></div>
                        <span class="status-badge ${u.bloqueado?'bg-red-500':'bg-green-500'}">${u.bloqueado?'BLOQUEADO':'ATIVO'}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-[10px] font-black uppercase mb-4 opacity-70">
                        <p>Saldo: ${u.saldo} KZ</p><p>Convidados: ${u.convidados || 0}</p>
                        <p class="col-span-2 text-blue-300">IBAN: ${u.banco?.i || 'NÃO DEFINIDO'}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="window.modificarSaldo('${uid}', 'add')" class="bg-green-600/20 text-green-500 py-2 btn-acao text-[9px]">Add Saldo</button>
                        <button onclick="window.modificarSaldo('${uid}', 'sub')" class="bg-red-600/20 text-red-500 py-2 btn-acao text-[9px]">Retirar</button>
                        <button onclick="window.darBonus('${uid}')" class="bg-blue-600/20 text-blue-500 py-2 btn-acao text-[9px]">Atribuir Bónus</button>
                        <button onclick="window.mudarSenha('${uid}')" class="bg-white/10 text-white py-2 btn-acao text-[9px]">Mudar Senha</button>
                        <button onclick="window.toggleBlock('${uid}', ${u.bloqueado})" class="bg-slate-700 py-2 btn-acao text-[9px]">${u.bloqueado?'Desbloquear':'Bloquear'}</button>
                        <button onclick="window.eliminar('${uid}')" class="bg-red-600 py-2 btn-acao text-[9px]">Eliminar Conta</button>
                    </div>
                    <div id="pendentes-${uid}" class="space-y-2 mt-4 border-t border-slate-700 pt-4"></div>
                    <details class="mt-2"><summary class="text-[9px] font-black text-slate-500 uppercase">Ver Extrato</summary>
                    <div class="text-[8px] space-y-1 mt-2">${u.extrato?.slice().reverse().map(e => `<div class="flex justify-between border-b border-white/5 py-1"><span>${e.desc}</span><b>${e.valor} KZ</b></div>`).join('') || 'Sem transações'}</div></details>
                `;
                list.appendChild(card);
                u.extrato?.forEach((ex, idx) => {
                    if(ex.status === "Em análise" || ex.status === "Pendente") {
                        const p = document.createElement('div'); p.className = "bg-slate-900 p-3 rounded-xl border border-blue-500/30";
                        p.innerHTML = `<div class="flex justify-between text-[10px] font-black uppercase"><span>${ex.desc}</span><b class="text-blue-400">${ex.valor} KZ</b></div>
                            ${ex.foto ? `<button onclick="window.ver('${ex.foto}', '${uid}', ${idx}, '${ex.desc}', ${ex.valor})" class="w-full bg-blue-600 text-[9px] py-2 mt-2 btn-acao">VER COMPROVANTE</button>` : ''}
                            <div class="grid grid-cols-2 gap-2 mt-3">
                                <button onclick="window.decidir('${uid}', ${idx}, 'Aprovado', ${ex.valor}, '${ex.desc}')" class="bg-green-600 py-2 rounded-lg text-[10px] font-black">APROVAR</button>
                                <button onclick="window.decidir('${uid}', ${idx}, 'Rejeitado', ${ex.valor}, '${ex.desc}')" class="bg-red-600 py-2 rounded-lg text-[10px] font-black">REJEITAR</button>
                            </div>`;
                        document.getElementById(`pendentes-${uid}`).appendChild(p);
                    }
                });
            });
        });
    }

    window.ver = (src, uid, idx, desc, valor) => { document.getElementById('full-img').src = src; document.getElementById('modal-img').classList.remove('hidden'); document.getElementById('btn-aprovar-modal').onclick = () => window.decidir(uid, idx, 'Aprovado', valor, desc); };
    window.fecharImg = () => document.getElementById('modal-img').classList.add('hidden');

    window.decidir = async (uid, idx, status, valor, desc) => {
        const ref = doc(db, "usuarios", uid); const s = await getDoc(ref); let ext = [...s.data().extrato]; ext[idx].status = status;
        let up = { extrato: ext };
        if(status === 'Aprovado' && desc.includes('Depósito')) up.saldo = increment(valor);
        if(status === 'Rejeitado' && desc.includes('Saque')) up.saldo = increment(valor);
        await updateDoc(ref, up); fecharImg(); alert("Ação Concluída!");
    };

    window.modificarSaldo = async (uid, t) => { const v = parseFloat(prompt("Valor:")); if(!v) return; await updateDoc(doc(db, "usuarios", uid), { saldo: increment(t==='add'?v:-v), extrato: arrayUnion({data:new Date().toLocaleString(), valor:v, desc: t==='add'?'Crédito Administrativo':'Débito Administrativo', status:'Concluído'}) }); };
    window.darBonus = async (uid) => { const v = parseFloat(prompt("Valor do Bónus:")); if(!v) return; await updateDoc(doc(db, "usuarios", uid), { saldo: increment(v), r_total: increment(v), extrato: arrayUnion({data:new Date().toLocaleString(), valor:v, desc:'Bónus Extra Atribuído', status:'Aprovado'}) }); };
    window.mudarSenha = async (uid) => { const p = prompt("Nova Senha (6 dígitos):"); if(p?.length === 6) await updateDoc(doc(db, "usuarios", uid), { pw: p }); };
    window.toggleBlock = async (uid, s) => { await updateDoc(doc(db, "usuarios", uid), { bloqueado: !s }); };
    window.eliminar = async (uid) => { if(confirm("ELIMINAR ESTA CONTA DEFINITIVAMENTE?")) await deleteDoc(doc(db, "usuarios", uid)); };
</script>
</body></html>
