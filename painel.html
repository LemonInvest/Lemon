<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevron Admin | Gestão em Nuvem</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --ch-blue: #0054a6; --ch-red: #ed1c24; --success: #28a745; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); padding: 15px; }
        .header { background: var(--ch-blue); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--ch-blue); font-size: 14px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-blue { background: var(--ch-blue); width: 100%; }
        .btn-green { background: var(--success); flex: 1; }
        .btn-red { background: var(--ch-red); flex: 1; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .info-item { background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        .info-item label { display: block; font-size: 9px; color: #888; font-weight: bold; }
        .info-item span { font-size: 13px; font-weight: 700; }
        .user-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
        .user-row:hover { background: #f0f7ff; }
        .pending-card { background: white; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-top: 4px solid var(--ch-red); }
        .pending-card img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; margin: 10px 0; background: #eee; }
    </style>
</head>
<body>

    <div class="header">
        <div><strong>CHEVRON ADMIN CLOUD</strong><br><small>Controle Global Angola</small></div>
        <div style="text-align:right;"><small>TOTAL CLIENTES</small><br><strong id="countU">0</strong></div>
    </div>

    <div class="card">
        <h2>🔍 Buscar Usuário (Número)</h2>
        <div style="display:flex; gap:5px;">
            <input type="number" id="inpSearch" placeholder="943692688">
            <button class="btn btn-blue" style="width:80px;" onclick="buscar()">BUSCAR</button>
        </div>

        <div id="painelUser" style="display:none; margin-top:15px; padding-top:15px; border-top: 1px dashed #ccc;">
            <div class="info-grid">
                <div class="info-item"><label>SALDO</label><span id="resSaldo">0 Kz</span></div>
                <div class="info-item"><label>SENHA</label><span id="resPass">---</span></div>
            </div>
            <input type="number" id="valAjuste" placeholder="Valor Kwanza">
            <div style="display:flex; gap:5px;">
                <button class="btn btn-green" onclick="ajustar('add')">ADICIONAR (+)</button>
                <button class="btn btn-red" onclick="ajustar('sub')">REMOVER (-)</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📥 Depósitos Pendentes</h2>
        <div id="listaRecargas"></div>
    </div>

    <div class="card">
        <h2>👥 Todos os Clientes na Nuvem</h2>
        <div id="todosUsers"></div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC3SurEz7aLcHG4yBUq5zrGBPOb2mvLpZ4",
            authDomain: "fir-6e9ec.firebaseapp.com",
            databaseURL: "https://fir-6e9ec-default-rtdb.firebaseio.com",
            projectId: "fir-6e9ec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let target = "";

        // ESCUTAR TODOS OS USUÁRIOS EM TEMPO REAL
        function monitorarUsuarios() {
            db.ref('contas').on('value', (snapshot) => {
                const data = snapshot.val();
                const tU = document.getElementById('todosUsers');
                tU.innerHTML = "";
                let count = 0;

                if (data) {
                    for (let tel in data) {
                        count++;
                        let user = data[tel];
                        tU.innerHTML += `
                            <div class="user-row" onclick="selecionar('${tel}')">
                                <span>+244 ${tel}</span>
                                <strong>${parseFloat(user.saldo || 0).toLocaleString()} Kz</strong>
                            </div>`;
                    }
                }
                document.getElementById('countU').innerText = count;
            });
        }

        // ESCUTAR RECARGAS
        function monitorarRecargas() {
            db.ref('pendencias/recargas').on('value', (snapshot) => {
                const list = document.getElementById('listaRecargas');
                list.innerHTML = "";
                const data = snapshot.val();
                if (!data) {
                    list.innerHTML = "<p style='font-size:11px; color:#999;'>Sem depósitos pendentes.</p>";
                    return;
                }
                for (let id in data) {
                    let r = data[id];
                    list.innerHTML += `
                        <div class="pending-card">
                            <strong>CLIENTE: +244 ${r.tel}</strong><br>
                            <span>Valor: ${parseFloat(r.valor).toLocaleString()} Kz</span><br>
                            <img src="${r.foto}" onclick="window.open(this.src)">
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-green" onclick="aprovarR('${id}', '${r.tel}', ${r.valor})">APROVAR</button>
                                <button class="btn btn-red" onclick="rejeitarR('${id}')">REJEITAR</button>
                            </div>
                        </div>`;
                }
            });
        }

        function selecionar(t) { document.getElementById('inpSearch').value = t; buscar(); }

        function buscar() {
            target = document.getElementById('inpSearch').value.trim();
            db.ref('contas/' + target).once('value').then((snap) => {
                const u = snap.val();
                if (u) {
                    document.getElementById('painelUser').style.display = 'block';
                    document.getElementById('resSaldo').innerText = parseFloat(u.saldo || 0).toLocaleString() + " Kz";
                    document.getElementById('resPass').innerText = u.senha;
                } else { alert("Não encontrado no banco de dados!"); }
            });
        }

        function ajustar(tipo) {
            let v = parseFloat(document.getElementById('valAjuste').value);
            if (!v || !target) return alert("Erro nos dados!");
            
            db.ref('contas/' + target).once('value').then(s => {
                let saldoAtual = parseFloat(s.val().saldo || 0);
                let novo = tipo === 'add' ? saldoAtual + v : saldoAtual - v;
                db.ref('contas/' + target + '/saldo').set(novo).then(() => {
                    alert("Saldo Atualizado na Nuvem!");
                    buscar();
                });
            });
        }

        function aprovarR(id, tel, valor) {
            db.ref('contas/' + tel).once('value').then(s => {
                let sAtual = parseFloat(s.val().saldo || 0);
                db.ref('contas/' + tel + '/saldo').set(sAtual + valor);
                db.ref('pendencias/recargas/' + id).remove();
                alert("Dinheiro enviado para o cliente!");
            });
        }

        function rejeitarR(id) {
            if(confirm("Rejeitar este comprovativo?")) db.ref('pendencias/recargas/' + id).remove();
        }

        monitorarUsuarios();
        monitorarRecargas();
    </script>
</body>
</html>
