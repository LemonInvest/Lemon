<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevron VIP | Angola Corporate</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --ch-blue: #0054a6; --ch-red: #ed1c24; --success: #28a745; --bg: #f4f7f6; --dark: #1a1a1b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: #333; padding-bottom: 90px; overflow-x: hidden; }

        /* TOAST */
        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: rgba(0,0,0,0.9); color: white; padding: 12px 25px; border-radius: 50px; 
            font-size: 13px; font-weight: 600; z-index: 10000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; opacity: 0;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* AUTH */
        #authPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #002d5a 0%, var(--ch-blue) 100%); padding: 20px; }
        .auth-card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 800; color: #bbb; cursor: pointer; }
        .tab-btn.active { color: var(--ch-blue); border-bottom: 3px solid var(--ch-blue); }
        .btn-main { width: 100%; padding: 15px; background: var(--ch-blue); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        input, select { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; outline: none; font-size: 14px; }

        /* APP */
        #mainApp { display: none; }
        .header-dash { background: var(--ch-blue); color: white; padding: 30px 20px 60px; border-radius: 0 0 30px 30px; text-align: center; }
        .balance-card { background: white; padding: 25px; border-radius: 20px; text-align: center; margin: -50px 15px 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .balance-amount { font-size: 28px; font-weight: 900; color: var(--success); }

        .vip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .vip-card { background: white; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #eee; position: relative; }
        .vip-badge { position: absolute; top: 0; left: 0; background: var(--ch-red); color: white; font-size: 10px; padding: 4px 10px; border-radius: 0 0 10px 0; font-weight: bold; }

        /* MODAIS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; max-height: 85vh; overflow-y: auto; }
        .hist-item { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-top: 10px; border-left: 5px solid orange; font-size: 12px; }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #a0aec0; font-size: 10px; font-weight: 800; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--ch-blue); }
        .page { display: none; }
        .active-page { display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="toast">🔔 <span>Mensagem</span></div>

    <div id="authPage">
        <div class="auth-card">
            <h2 style="color:var(--ch-blue); margin-bottom:20px;">CHEVRON VIP</h2>
            <div style="display:flex; margin-bottom:20px; border-bottom:1px solid #eee;">
                <button class="tab-btn active" id="btnT1" onclick="setAuth('login')">ENTRAR</button>
                <button class="tab-btn" id="btnT2" onclick="setAuth('reg')">REGISTAR</button>
            </div>
            <input type="number" id="uTel" placeholder="Telemóvel (ex: 943...)">
            <input type="password" id="uPass" placeholder="Palavra-passe">
            <div id="divRef" class="hidden">
                <input type="number" id="uRef" placeholder="ID de Convite (Opcional)">
            </div>
            <button class="btn-main" id="btnAction" onclick="handleAuth()">ENTRAR AGORA</button>
        </div>
    </div>

    <div id="mainApp">
        <div id="p-home" class="page active-page">
            <div class="header-dash">
                <p style="font-size:10px; opacity:0.8;">ANGOLA CORPORATE UNIT</p>
                <strong id="uID">---</strong>
            </div>
            <div class="balance-card">
                <p style="font-size:11px; font-weight:bold; color:#888;">SALDO DISPONÍVEL (AOA)</p>
                <div class="balance-amount" id="mainSaldo">0,00 Kz</div>
            </div>
            <div class="vip-grid" id="vipGrid"></div>
        </div>

        <div id="p-assets" class="page">
            <div style="padding:20px;">
                <h3 style="color:var(--ch-blue); margin-bottom:15px;">📊 Meus Rendimentos</h3>
                <div id="listAssets"></div>
                <h3 style="color:var(--ch-blue); margin: 25px 0 10px;">🎯 Missão Diária</h3>
                <div id="listMissions"></div>
            </div>
        </div>

        <div id="p-profile" class="page">
            <div style="padding:20px;">
                <button class="btn-main" onclick="openM('recharge')">💰 RECARREGAR</button>
                <button class="btn-main" onclick="openM('withdraw')">💸 LEVANTAMENTO</button>
                <button class="btn-main" onclick="copiarLink()">🔗 COPIAR LINK DE CONVITE</button>
                <button class="btn-main" style="background:var(--ch-red); margin-top:30px;" onclick="location.reload()">SAIR</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="nav('home', this)"><span>🏠</span>INÍCIO</div>
            <div class="nav-item" onclick="nav('assets', this)"><span>🎯</span>MISSÕES</div>
            <div class="nav-item" onclick="nav('profile', this)"><span>👤</span>PERFIL</div>
        </nav>
    </div>

    <div id="m-recharge" class="modal"><div class="modal-content">
        <h3>Recarregar Conta</h3>
        <select id="selBanco">
            <option value="ViaExpress">VIA EXPRESS: 921 054 122</option>
            <option value="BFA">BFA: 0006 0000 2870 9134 3015 1</option>
        </select>
        <input type="number" id="vRec" placeholder="Valor (Kz)">
        <input type="file" id="fInp" accept="image/*">
        <button class="btn-main" onclick="confirmarRecarga()">ENVIAR COMPROVATIVO</button>
        <button class="btn-main" style="background:#888" onclick="closeM()">FECHAR</button>
    </div></div>

    <script>
        // CONFIGURAÇÃO FIREBASE (A tua chave)
        const firebaseConfig = {
            apiKey: "AIzaSyC3SurEz7aLcHG4yBUq5zrGBPOb2mvLpZ4",
            authDomain: "fir-6e9ec.firebaseapp.com",
            databaseURL: "https://fir-6e9ec-default-rtdb.firebaseio.com",
            projectId: "fir-6e9ec"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuTel = "";
        let authMode = "login";
        let saldo = 0;
        let ativos = [];

        const vips = [
            { n: "VIP 1", p: 12400, l: 520.8 }, { n: "VIP 2", p: 45000, l: 1890 },
            { n: "VIP 3", p: 100000, l: 4200 }, { n: "VIP 4", p: 250000, l: 10500 },
            { n: "VIP 5", p: 500000, l: 21000 }, { n: "VIP 6", p: 1000000, l: 42000 }
        ];

        function notify(msg) {
            const t = document.getElementById('toast');
            t.querySelector('span').innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // LÓGICA DE LOGIN E REGISTO COM FIREBASE
        function handleAuth() {
            const tel = document.getElementById('uTel').value.trim();
            const pass = document.getElementById('uPass').value.trim();
            const ref = document.getElementById('uRef').value.trim();

            if(!tel || !pass) return notify("⚠️ Preencha os campos!");

            if(authMode === "reg") {
                db.ref('contas/' + tel).once('value').then(snap => {
                    if(snap.exists()) return notify("❌ Número já cadastrado!");
                    
                    db.ref('contas/' + tel).set({
                        senha: pass,
                        saldo: 1000, // Bónus inicial
                        padrinho: ref || "direto",
                        ativos: []
                    }).then(() => {
                        notify("✅ Conta Criada! Faça Login.");
                        setAuth('login');
                    });
                });
            } else {
                db.ref('contas/' + tel).once('value').then(snap => {
                    const user = snap.val();
                    if(user && user.senha === pass) {
                        meuTel = tel;
                        entrarNoApp();
                    } else { notify("❌ Dados incorretos!"); }
                });
            }
        }

        function entrarNoApp() {
            // Monitorar saldo e dados em tempo real da nuvem
            db.ref('contas/' + meuTel).on('value', snap => {
                const user = snap.val();
                saldo = parseFloat(user.saldo || 0);
                ativos = user.ativos || [];
                updateUI();
                document.getElementById('uID').innerText = "+244 " + meuTel;
            });
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            renderVips();
        }

        function comprar(i) {
            if(saldo >= vips[i].p) {
                const novoSaldo = saldo - vips[i].p;
                ativos.push({ ...vips[i], data: new Date().getTime() });
                
                // Atualiza o usuário
                db.ref('contas/' + meuTel).update({
                    saldo: novoSaldo,
                    ativos: ativos
                });

                // Bónus para quem convidou
                db.ref('contas/' + meuTel + '/padrinho').once('value').then(pSnap => {
                    let pad = pSnap.val();
                    if(pad && pad !== "direto") {
                        db.ref('contas/' + pad + '/saldo').once('value').then(sSnap => {
                            let sPad = parseFloat(sSnap.val() || 0);
                            db.ref('contas/' + pad + '/saldo').set(sPad + (vips[i].p * 0.10));
                        });
                    }
                });
                notify("✅ VIP Ativado!");
            } else { notify("❌ Saldo insuficiente!"); }
        }

        function confirmarRecarga() {
            const val = document.getElementById('vRec').value;
            const file = document.getElementById('fInp').files[0];
            if(!val || !file) return notify("⚠️ Preencha tudo!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const idRecarga = Date.now();
                db.ref('pendencias/recargas/' + idRecarga).set({
                    tel: meuTel,
                    valor: parseFloat(val),
                    foto: e.target.result
                }).then(() => {
                    notify("📩 Comprovativo enviado!");
                    closeM();
                });
            };
            reader.readAsDataURL(file);
        }

        // Funções de Interface (Mantidas do original mas adaptadas)
        function renderVips() {
            document.getElementById('vipGrid').innerHTML = vips.map((v, i) => `
                <div class="vip-card">
                    <div class="vip-badge">${v.n}</div>
                    <strong>Custo: ${v.p.toLocaleString()} Kz</strong>
                    <p style="font-size:11px; color:var(--success);">Ganha ${v.l.toLocaleString()} / dia</p>
                    <button class="btn-main" style="padding:8px" onclick="comprar(${i})">ATIVAR</button>
                </div>`).join('');
        }

        function updateUI() { 
            document.getElementById('mainSaldo').innerText = saldo.toLocaleString('pt-AO') + " Kz"; 
        }

        function setAuth(m) {
            authMode = m;
            document.getElementById('btnT1').classList.toggle('active', m==='login');
            document.getElementById('btnT2').classList.toggle('active', m==='reg');
            document.getElementById('divRef').classList.toggle('hidden', m==='login');
            document.getElementById('btnAction').innerText = m==='login' ? "ENTRAR AGORA" : "CRIAR CONTA";
        }

        function nav(p, e) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            e.classList.add('active'); document.getElementById('p-' + p).classList.add('active-page');
        }

        function openM(id) { document.getElementById('m-' + id).style.display = 'flex'; }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        
        function copiarLink() {
            const link = window.location.origin + window.location.pathname + "?ref=" + meuTel;
            navigator.clipboard.writeText(link).then(() => notify("🔗 Link copiado!"));
        }
    </script>
</body>
</html>
